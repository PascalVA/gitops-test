apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: dynamic-app-blue
  namespace: applications
  name: dynamic-app-blue
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dynamic-app-blue
  template:
    metadata:
      labels:
        app: dynamic-app-blue
    spec:
      containers:
      - image: nginx:latest
        name: nginx
